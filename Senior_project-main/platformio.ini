; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	https://github.com/rodneybakiskan/ps5-esp32.git
	adafruit/Adafruit BNO08x@^1.2.5
	adafruit/Adafruit Unified Sensor @ ^1.1.14
	happy12/SPL06-001@^1.0.0
	adafruit/Adafruit BMP280 Library@^3.0.0
    https://github.com/micro-ROS/micro_ros_platformio
upload_speed = 115200
monitor_speed = 115200
# ต้องระบุ Distro เพื่อให้มันไปโหลด Source มาคอมไพล์
board_microros_distro = humble
# กำหนด transport เป็น wifi (หรือ serial ตามการใช้งาน)
board_microros_transport = serial
